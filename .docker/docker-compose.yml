version: "3.8"
services:
  db:
    container_name: etf_filing_db
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    container_name: redis_broker
    image: redis:7
    restart: always
    ports: 
      - "6379:6379" 
    volumes:
      - redis_data:/data
  redis-commander:
    container_name: redis_ui
    image: rediscommander/redis-commander
    restart: always
    ports:
      - "8081:8081"
    environments:
      - REDIS_HOSTS=local:redis:6379
volumes:
  postgres_data: {}
  redis_data: {}